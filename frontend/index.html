<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperQA Chat</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ─── Sidebar ─── -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <span>PaperQA</span>
      </div>
      <div class="health-badge" id="health-badge" title="后端服务状态">
        <span class="health-dot" id="health-dot"></span>
        <span class="health-label" id="health-label">检查中...</span>
      </div>
    </div>

    <nav class="nav">
      <button class="nav-item active" data-view="chat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>对话</span>
      </button>
      <div class="nav-has-dropdown" id="papers-nav-group">
        <button class="nav-item" id="papers-nav-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>论文列表</span>
          <svg class="dropdown-arrow" id="dropdown-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="nav-dropdown" id="papers-dropdown" style="display:none">
          <button class="dropdown-action" id="add-paper-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span>添加新论文</span>
          </button>
          <div class="dropdown-divider"></div>
          <div class="paper-list" id="paper-list">
            <p class="paper-list-empty">暂无论文，点击上方添加</p>
          </div>
        </div>
      </div>
    </nav>

    <div class="sidebar-footer">
      <span class="version">v0.1.0</span>
    </div>
  </aside>

  <!-- ─── Main ─── -->
  <main id="main">
    <!-- Header -->
    <header id="chat-header">
      <h1>对话</h1>
      <div class="stats" id="stats">
        <span class="stat">Tokens: <strong id="token-count">0</strong></span>
        <span class="stat-divider"></span>
        <span class="stat">消息: <strong id="msg-count">0</strong></span>
        <span class="stat-divider"></span>
        <span class="stat">窗口: <strong id="win-height">0</strong>px</span>
      </div>
    </header>

    <!-- Messages -->
    <div id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">✦</div>
        <h2>有什么可以帮助你的？</h2>
        <p>我是 PaperQA 助手，可以帮你查询和分析学术论文。</p>
      </div>
    </div>

    <!-- Input -->
    <div id="input-area">
      <div class="input-wrapper">
        <textarea id="chat-input" rows="1" placeholder="输入你的问题..." autofocus></textarea>
        <button id="send-btn" disabled aria-label="发送">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <p class="input-hint">Enter 发送 · Shift+Enter 换行</p>
    </div>
  </main>


  <!-- ─── Add Paper Modal ─── -->
  <div class="modal-overlay" id="add-paper-modal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3>添加新论文</h3>
        <div class="modal-header-actions">
          <button class="modal-minimize" id="add-paper-minimize" title="最小化">─</button>
          <button class="modal-close" id="add-paper-close">&times;</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="form-section">
          <label class="form-label">DOI 输入</label>
          <div class="doi-input-row">
            <input type="text" class="form-input" id="doi-input" placeholder="例如: 10.1038/s41586-023-06236-9">
            <button class="btn btn-primary" id="doi-submit-btn">添加</button>
          </div>
        </div>
        <div class="form-divider"><span>或</span></div>
        <div class="form-section">
          <label class="form-label">上传 PDF 文件</label>
          <div class="upload-zone" id="upload-zone">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>点击或拖拽 PDF 文件到此处</p>
            <input type="file" id="file-input" accept=".pdf" hidden>
          </div>
          <p class="upload-status" id="upload-status"></p>
        </div>
        <div class="form-status" id="ingest-status"></div>
      </div>
    </div>
  </div>

  <!-- ─── Paper Detail Modal ─── -->
  <div class="modal-overlay" id="paper-detail-modal" style="display:none">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h3 id="detail-title">论文详情</h3>
        <button class="modal-close" id="detail-close">&times;</button>
      </div>
      <div class="modal-body" id="detail-body">
        <!-- dynamically populated -->
      </div>
    </div>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/lib/marked.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
